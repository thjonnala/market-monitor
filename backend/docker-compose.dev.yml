# Local PostgreSQL for development.
# Start:  docker compose -f backend/docker-compose.dev.yml up -d
# Matches the connection string in appsettings.Development.json.

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketmonitor-postgres
    environment:
      POSTGRES_DB: thiruapps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - marketmonitor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thiruapps"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  marketmonitor_pgdata:
